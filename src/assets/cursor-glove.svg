<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Рука-указатель по референсу владельца: белая перчатка, толстый тёмный
       контур, три штриха на ладони, манжета внизу справа.
       Горячая точка курсора: кончик пальца ~ (9,2) -->
  <g stroke="#191c2b" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" fill="#f9f7f0">
    <!-- манжета -->
    <path d="M18 20 L26.8 15.6 Q28.9 18.4 27.7 21.7 L20 27 Q17.7 27.4 16.9 24.7 Z"/>
    <!-- большой палец -->
    <ellipse cx="7.6" cy="13.6" rx="3.4" ry="2.4" transform="rotate(-28 7.6 13.6)"/>
    <!-- указательный палец -->
    <path d="M7.5 3.1 Q8.3 1.1 10.1 1.9 Q11.3 2.4 11.8 3.9 L14.4 10.8 L9.2 12.6 L6.8 5.3 Q6.3 3.9 7.5 3.1 Z"/>
    <!-- ладонь -->
    <path d="M9 11.6 Q13 9.2 17.6 10.1 Q22.9 11.5 22.7 16.5 Q22.5 21.2 17.9 23.3 Q13.3 25.3 9.9 21.9 Q6.7 18.7 7.7 14.3 Q8.1 12.5 9 11.6 Z"/>
    <!-- три штриха (сложенные пальцы) -->
    <path d="M13.2 14.8 V18.8 M15.9 14.4 V18.6 M18.5 14.6 V18.9" fill="none" stroke-width="1.7"/>
  </g>
</svg>
