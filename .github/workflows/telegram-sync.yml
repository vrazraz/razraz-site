name: Sync Telegram posts

on:
  schedule:
    - cron: '17 * * * *' # ежечасно
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/sync-telegram.mjs
      - name: Commit new posts
        run: |
          if git diff --quiet content/blog.json; then
            echo "Изменений нет"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog.json
          git commit -m "blog: автоимпорт постов из Telegram"
          git push
